buildType:
  default: debug
  choices:
    debug:
      short: Debug
      long: Emit debug information
      buildType: Debug
    release:
      short: Release
      long: Optimize generated code
      buildType: Release
    minsizerel:
      short: MinSizeRel
      long: Optimize for size
      buildType: MinSizeRel
    relwithdebinfo:
      short: RelWithDebInfo
      long: Optimized with debug info
      buildType: RelWithDebInfo
    asan:
      short: ASAN
      long: Address Sanitizer
      buildType: ASAN
