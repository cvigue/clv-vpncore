# OpenVPN server — userspace data path, TCP
# For use with the perf harness (simpl=ovpn dpsrv=user transport=tcp).
# DCO does not apply to TCP transport.
# Run with: openvpn --cd PROJECT_ROOT --config perf/configs/server_ovpn_user_tcp.conf
local 192.168.50.2
port 1194
proto tcp-server
dev tun

ca test_data/certs/ca.crt
cert test_data/certs/server.crt
key test_data/certs/server.key
dh test_data/certs/dh2048.pem
tls-crypt test_data/certs/tls-crypt.key

server 10.8.0.0 255.255.255.0
push "dhcp-option DNS 8.8.8.8"
client-to-client

cipher AES-256-GCM
data-ciphers AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
auth SHA256

tun-mtu 1400
sndbuf 4194304
rcvbuf 4194304
keepalive 10 60
verb 3
