# OpenVPN server — DCO data path, UDP
# For use with the perf harness (simpl=ovpn dpsrv=dco transport=udp).
# No disable-dco: OpenVPN 2.6+ opportunistically enables DCO when the
# ovpn-dco kernel module is loaded and all data-ciphers are AEAD.
# Run with: openvpn --cd PROJECT_ROOT --config perf/configs/server_ovpn_dco_udp.conf
local 192.168.50.2
port 1194
proto udp
dev tun

ca test_data/certs/ca.crt
cert test_data/certs/server.crt
key test_data/certs/server.key
dh test_data/certs/dh2048.pem
tls-crypt test_data/certs/tls-crypt.key

server 10.8.0.0 255.255.255.0
topology subnet
push "dhcp-option DNS 8.8.8.8"
client-to-client

cipher AES-256-GCM
data-ciphers AES-256-GCM:AES-128-GCM
auth none

tun-mtu 1400
sndbuf 4194304
rcvbuf 4194304
keepalive 10 60
verb 3
