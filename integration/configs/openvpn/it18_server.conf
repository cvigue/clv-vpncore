# IT18: OpenVPN reference-implementation server — tls-crypt v2
#
# Interop test: openvpn as server (tls-crypt-v2), simple_vpn as client.
# Validates cross-implementation tls-crypt-v2 packet format compatibility.
#
# Paths are relative to project root.
# Invoke with: openvpn --cd PROJECT_ROOT --config integration/configs/openvpn/it18_server.conf

local 10.99.0.1
port 1194
proto udp
dev tun

ca test_data/certs/ca.crt
cert test_data/certs/server.crt
key test_data/certs/server.key
dh test_data/certs/dh2048.pem
tls-crypt-v2 test_data/certs/tls-crypt-v2-server.key

server 10.8.0.0 255.255.255.0
push "dhcp-option DNS 8.8.8.8"

data-ciphers AES-256-GCM:CHACHA20-POLY1305
cipher AES-256-GCM

keepalive 10 60
verb 3
