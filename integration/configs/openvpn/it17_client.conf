# IT17: OpenVPN reference-implementation client
#
# Interop test: simple_vpn as server, openvpn as client.
# Connects to simple_vpn server (it_server.json) at 10.99.0.1:1194.
#
# Paths are relative to project root.
# Invoke with: openvpn --cd PROJECT_ROOT --config integration/configs/openvpn/it17_client.conf

client
dev tun
proto udp
remote 10.99.0.1 1194

ca test_data/certs/ca.crt
cert test_data/certs/client.crt
key test_data/certs/client.key
tls-crypt test_data/certs/tls-crypt.key

data-ciphers AES-256-GCM:CHACHA20-POLY1305
cipher AES-256-GCM

verb 3
